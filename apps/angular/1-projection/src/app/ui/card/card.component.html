<div class="flex w-fit flex-col gap-3 rounded-md border-2 border-black p-4" [ngClass]="customClass()">
  <img [src]="imgSrc()" width="200" height="200" alt="" />

  <section>
    @for (item of list(); track item) {
      <app-list-item
        [name]="item.firstName ?? item.name"
        [id]="item.id"
        [type]="type()"
        (itemDeleted)="deleteItem(item.id)"></app-list-item>
    }
  </section>

  <button
    class="rounded-sm border border-blue-500 bg-blue-300 p-2"
    (click)="addNewItem()">
    Add
  </button>
</div>
